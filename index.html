<!DOCTYPE html>
<html lang="es">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demostración TI - Inicio</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #06273d; margin: 0; padding: 0; color: #fdfcfc; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }

        .rest-title { color: #e01818; }
        .soap-title { color: #0056b3; }
